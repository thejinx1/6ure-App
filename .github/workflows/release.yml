name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag override without v prefix (e.g. 1.3.0)"
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  SOURCE_DIR: "Developer Files/Source Code"
  APP_NAME: "6ure™ App"
  WIN_PACKAGE: "6ure-app-windows-x64.zip"
  WIN_SETUP: "6ure-app-setup-windows-x64.exe"
  MAC_PACKAGE: "6ure-app-macos.dmg"
  LINUX_PACKAGE: "6ure-app-linux-x64.tar.gz"

jobs:
  build-windows:
    name: Windows NSIS setup + ZIP
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Determine Windows package version
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $serverText = Get-Content -Raw -LiteralPath "server.py"
            $match = [regex]::Match($serverText, 'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"')
            if (-not $match.Success) {
              throw "Could not read DEFAULT_APP_VERSION from server.py"
            }
            $version = $match.Groups[1].Value.TrimStart("v")
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REYLI_APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows package version: $version"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Create ZIP
        run: |
          $appName = "6ure$([char]0x2122) App"
          $distDir = Join-Path "dist" $appName
          if (!(Test-Path -LiteralPath $distDir)) {
            throw "Build output was not found: $distDir"
          }
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.WIN_PACKAGE }}"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $distDir "*") -DestinationPath $zipPath -Force

      - name: Create NSIS setup
        run: |
          $appName = "6ure$([char]0x2122) App"
          $legacyAppName = "6ure Files"
          $exeName = "$appName.exe"
          $distDir = Join-Path "dist" $appName
          if (!(Test-Path -LiteralPath $distDir)) {
            throw "Build output was not found: $distDir"
          }

          foreach ($required in @($exeName, "_internal", "update-config.json")) {
            if (!(Test-Path -LiteralPath (Join-Path $distDir $required))) {
              throw "Required application file is missing: $required"
            }
          }

          $version = $env:APP_VERSION
          if (-not $version) {
            throw "APP_VERSION was not set."
          }

          $versionParts = @($version -split '[^0-9]+' | Where-Object { $_ -ne "" } | Select-Object -First 4)
          while ($versionParts.Count -lt 4) {
            $versionParts += "0"
          }
          $nsisProductVersion = ($versionParts | ForEach-Object {
            $part = [int]$_
            if ($part -gt 65535) { "65535" } else { [string]$part }
          }) -join "."

          $distFullPath = (Resolve-Path -LiteralPath $distDir).Path
          $iconPath = (Resolve-Path -LiteralPath "assets\6ure-logo.ico").Path
          $setupPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.WIN_SETUP }}"
          $nsiPath = Join-Path $env:GITHUB_WORKSPACE "6ure-app-setup-windows-x64.nsi"
          $stageRoot = Join-Path $env:RUNNER_TEMP "6ure-nsis-stage"
          $stageAppDir = Join-Path $stageRoot "app"

          foreach ($outputPath in @($setupPath, $nsiPath)) {
            if (Test-Path -LiteralPath $outputPath) {
              Remove-Item -LiteralPath $outputPath -Force
            }
          }
          if (Test-Path -LiteralPath $stageRoot) {
            Remove-Item -LiteralPath $stageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stageAppDir | Out-Null
          Get-ChildItem -LiteralPath $distFullPath -Force | Copy-Item -Destination $stageAppDir -Recurse -Force

          $nsis = @"
          Unicode true
          Name "$appName"
          OutFile "$setupPath"
          InstallDir "`$LOCALAPPDATA\Programs\$appName"
          RequestExecutionLevel user
          SetCompressor /SOLID lzma
          VIProductVersion "$nsisProductVersion"
          VIAddVersionKey "ProductName" "$appName"
          VIAddVersionKey "CompanyName" "reyli"
          VIAddVersionKey "FileDescription" "$appName Setup"
          VIAddVersionKey "FileVersion" "$version"
          VIAddVersionKey "ProductVersion" "$version"
          VIAddVersionKey "LegalCopyright" "reyli"

          !include MUI2.nsh
          !define MUI_ABORTWARNING
          !define MUI_ICON "$iconPath"
          !define MUI_UNICON "$iconPath"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "$stageAppDir\*"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
            Delete "`$DESKTOP\$legacyAppName.lnk"
            Delete "`$SMPROGRAMS\$legacyAppName\$legacyAppName.lnk"
            RMDir "`$SMPROGRAMS\$legacyAppName"
            CreateDirectory "`$SMPROGRAMS\$appName"
            CreateShortcut "`$SMPROGRAMS\$appName\$appName.lnk" "`$INSTDIR\$exeName"
            CreateShortcut "`$DESKTOP\$appName.lnk" "`$INSTDIR\$exeName"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$legacyAppName"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "DisplayName" "$appName"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "DisplayVersion" "$version"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "Publisher" "reyli"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "InstallLocation" "`$INSTDIR"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "UninstallString" '"`$INSTDIR\Uninstall.exe"'
            WriteRegDWORD HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "NoModify" 1
            WriteRegDWORD HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "NoRepair" 1
          SectionEnd

          Section "Uninstall"
            Delete "`$DESKTOP\$appName.lnk"
            Delete "`$DESKTOP\$legacyAppName.lnk"
            Delete "`$SMPROGRAMS\$appName\$appName.lnk"
            Delete "`$SMPROGRAMS\$legacyAppName\$legacyAppName.lnk"
            RMDir "`$SMPROGRAMS\$appName"
            RMDir "`$SMPROGRAMS\$legacyAppName"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\$legacyAppName"
            RMDir /r "`$INSTDIR"
          SectionEnd
          "@

          Set-Content -LiteralPath $nsiPath -Value $nsis -Encoding utf8BOM

          $makensisCandidates = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $makensisCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $makensis) {
            $command = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if ($command) {
              $makensis = $command.Source
            }
          }
          if (-not $makensis) {
            throw "NSIS makensis.exe was not found."
          }

          & $makensis $nsiPath
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS setup build failed with exit code $LASTEXITCODE"
          }
          if (!(Test-Path -LiteralPath $setupPath)) {
            throw "NSIS setup output was not found: $setupPath"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ${{ env.WIN_PACKAGE }}
            ${{ env.WIN_SETUP }}
          retention-days: 7

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Write app version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1))
          PY
          )"
          fi
          VERSION="${VERSION#v}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > app-version.json
          echo "App version: $VERSION"

      - name: Convert PNG to ICNS
        run: |
          rm -rf assets/6ure-logo.iconset
          mkdir -p assets/6ure-logo.iconset
          sips -z   16   16 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_16x16.png
          sips -z   32   32 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_16x16@2x.png
          sips -z   32   32 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_32x32.png
          sips -z   64   64 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_32x32@2x.png
          sips -z  128  128 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_128x128.png
          sips -z  256  256 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_128x128@2x.png
          sips -z  256  256 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_256x256.png
          sips -z  512  512 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_256x256@2x.png
          sips -z  512  512 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_512x512.png
          sips -z 1024 1024 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_512x512@2x.png
          iconutil -c icns assets/6ure-logo.iconset -o assets/6ure-logo.icns

      - name: Create macOS PyInstaller spec
        run: |
          cat > "6ure App.macos.spec" <<'PYISPEC'
          # -*- mode: python ; coding: utf-8 -*-

          app_name = "6ure™ App"

          a = Analysis(
              ["files_app.py"],
              pathex=[],
              binaries=[],
              datas=[("index.html", "."), ("assets", "assets"), ("discord-presence.json", "."), ("update-config.json", "."), ("app-version.json", ".")],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name=app_name,
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon="assets/6ure-logo.icns",
          )

          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=True,
              upx_exclude=[],
              name=app_name,
          )

          app = BUNDLE(
              coll,
              name=f"{app_name}.app",
              icon="assets/6ure-logo.icns",
              bundle_identifier="com.reyli.6ureapp",
          )
          PYISPEC

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean "6ure App.macos.spec"

      - name: Optional codesign
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          if [ -z "$CODESIGN_IDENTITY" ]; then
            echo "CODESIGN_IDENTITY is not set; skipping codesign."
            exit 0
          fi
          APP_PATH="$(find dist -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist"
            exit 1
          fi
          codesign --deep --force --sign "$CODESIGN_IDENTITY" "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="$(find dist -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist"
            exit 1
          fi
          rm -rf dmg-stage
          mkdir -p dmg-stage
          cp -a "$APP_PATH" dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder dmg-stage -ov -format UDZO "$GITHUB_WORKSPACE/${{ env.MAC_PACKAGE }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.MAC_PACKAGE }}
          retention-days: 7

  build-linux:
    name: Linux tar.gz
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            gir1.2-webkit2-4.1 \
            gobject-introspection \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pycairo PyGObject
          pip install -r requirements.txt

      - name: Write app version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1))
          PY
          )"
          fi
          VERSION="${VERSION#v}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > app-version.json
          echo "App version: $VERSION"

      - name: Create Linux PyInstaller spec
        run: |
          python - <<'PY'
          from pathlib import Path

          spec = Path("6ure Files.spec").read_text(encoding="utf-8")
          spec = spec.replace("icon='assets\\\\6ure-logo.ico',", "icon=None,")
          spec = spec.replace("datas=[('index.html', '.'), ('assets', 'assets'), ('discord-presence.json', '.'), ('app-version.json', '.')]", "datas=[('index.html', '.'), ('assets', 'assets'), ('discord-presence.json', '.'), ('update-config.json', '.'), ('app-version.json', '.')]")
          Path("6ure Files.linux.spec").write_text(spec, encoding="utf-8")
          PY

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean "6ure Files.linux.spec"

      - name: Create tar.gz
        run: |
          APP_DIR="$(find dist -mindepth 1 -maxdepth 1 -type d -name '6ure*App' -print -quit)"
          if [ -z "$APP_DIR" ]; then
            echo "Build output was not found in dist"
            find dist -maxdepth 2 -print || true
            exit 1
          fi
          tar czf "$GITHUB_WORKSPACE/${{ env.LINUX_PACKAGE }}" -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.LINUX_PACKAGE }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("Developer Files/Source Code/server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1).lstrip("v"))
          PY
          )"
          fi

          echo "ver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum windows-build/${{ env.WIN_SETUP }} > checksums.txt
          sha256sum windows-build/${{ env.WIN_PACKAGE }} >> checksums.txt
          sha256sum macos-build/${{ env.MAC_PACKAGE }} >> checksums.txt
          sha256sum linux-build/${{ env.LINUX_PACKAGE }} >> checksums.txt
          echo "--- SHA-256 checksums ---"
          cat checksums.txt

      - name: Generate latest.json manifest
        run: |
          VERSION="${{ steps.version.outputs.ver }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          WIN_FILE="artifacts/windows-build/${{ env.WIN_SETUP }}"
          MAC_FILE="artifacts/macos-build/${{ env.MAC_PACKAGE }}"
          LNX_FILE="artifacts/linux-build/${{ env.LINUX_PACKAGE }}"

          WIN_SHA=$(sha256sum "$WIN_FILE" | awk '{print $1}')
          MAC_SHA=$(sha256sum "$MAC_FILE" | awk '{print $1}')
          LNX_SHA=$(sha256sum "$LNX_FILE" | awk '{print $1}')

          WIN_SIZE=$(stat -c%s "$WIN_FILE")
          MAC_SIZE=$(stat -c%s "$MAC_FILE")
          LNX_SIZE=$(stat -c%s "$LNX_FILE")

          cat > artifacts/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "6ure App ${VERSION}",
            "windows": {
              "url": "${BASE_URL}/${{ env.WIN_SETUP }}",
              "sha256": "${WIN_SHA}",
              "sizeBytes": ${WIN_SIZE},
              "packageType": "installer",
              "installerArgs": "/S",
              "successExitCodes": [0, 3010]
            },
            "macos": {
              "url": "${BASE_URL}/${{ env.MAC_PACKAGE }}",
              "sha256": "${MAC_SHA}",
              "sizeBytes": ${MAC_SIZE},
              "packageType": "dmg"
            },
            "linux": {
              "url": "${BASE_URL}/${{ env.LINUX_PACKAGE }}",
              "sha256": "${LNX_SHA}",
              "sizeBytes": ${LNX_SIZE},
              "packageType": "tar.gz"
            }
          }
          MANIFEST

          echo "--- latest.json ---"
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "6ure™ App ${{ steps.version.outputs.ver }}"
          body: |
            ## 6ure™ App ${{ steps.version.outputs.ver }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows Setup (x64) | `${{ env.WIN_SETUP }}` |
            | Windows Portable ZIP (x64) | `${{ env.WIN_PACKAGE }}` |
            | macOS | `${{ env.MAC_PACKAGE }}` |
            | Linux (x64) | `${{ env.LINUX_PACKAGE }}` |

            See `checksums.txt` for SHA-256 verification.
            See `latest.json` for the auto-update manifest.
          files: |
            artifacts/windows-build/${{ env.WIN_SETUP }}
            artifacts/windows-build/${{ env.WIN_PACKAGE }}
            artifacts/macos-build/${{ env.MAC_PACKAGE }}
            artifacts/linux-build/${{ env.LINUX_PACKAGE }}
            artifacts/checksums.txt
            artifacts/latest.json
          draft: false
          prerelease: false
          make_latest: true

      - name: Update GitHub Pages latest.json
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" FETCH_HEAD

          cp artifacts/latest.json latest.json
          touch .nojekyll

          mkdir -p "Developer Files/GitHub Update Server"
          cp artifacts/latest.json "Developer Files/GitHub Update Server/latest.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json .nojekyll "Developer Files/GitHub Update Server/latest.json"

          if git diff --cached --quiet; then
            echo "GitHub Pages latest.json is already up to date."
            exit 0
          fi

          git commit -m "Update Pages auto-update manifest for ${{ steps.version.outputs.tag }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

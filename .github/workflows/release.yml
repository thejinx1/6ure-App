name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag override without v prefix (e.g. 1.3.0)"
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  SOURCE_DIR: "Developer Files/Source Code"
  APP_NAME: "6ure™ App"
  WIN_PACKAGE: "6ure-app-windows-x64.zip"
  WIN_SETUP: "6ure-app-setup-windows-x64.exe"
  MAC_PACKAGE: "6ure-app-macos.dmg"
  LINUX_PACKAGE: "6ure-app-linux-x64.tar.gz"

jobs:
  build-windows:
    name: Windows NSIS setup + ZIP
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Determine Windows package version
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}".TrimStart("v")
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $serverText = Get-Content -Raw -LiteralPath "server.py"
            $match = [regex]::Match($serverText, 'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"')
            if (-not $match.Success) {
              throw "Could not read DEFAULT_APP_VERSION from server.py"
            }
            $version = $match.Groups[1].Value.TrimStart("v")
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REYLI_APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows package version: $version"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Import Windows code signing certificate
        env:
          WINDOWS_CODE_SIGN_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGN_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGN_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CODE_SIGN_CERTIFICATE_BASE64) {
            Write-Host "WINDOWS_CODE_SIGN_CERTIFICATE_BASE64 is not set; skipping Windows code signing."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODE_SIGN_CERTIFICATE_BASE64))
          $certPassword = if ($null -eq $env:WINDOWS_CODE_SIGN_CERTIFICATE_PASSWORD) { "" } else { $env:WINDOWS_CODE_SIGN_CERTIFICATE_PASSWORD }
          $password = ConvertTo-SecureString -String $certPassword -AsPlainText -Force
          $cert = @(Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Where-Object { $_.HasPrivateKey } | Select-Object -First 1)[0]
          if (-not $cert) {
            throw "Windows code signing certificate could not be imported."
          }
          "REYLI_CODE_SIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "REYLI_CODE_SIGN_TIMESTAMP_URL=http://timestamp.digicert.com" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Imported Windows code signing certificate: $($cert.Thumbprint)"

      - name: Build with PyInstaller
        run: |
          & .\build.ps1

      - name: Verify Windows app bundle
        run: |
          $appName = "6ure$([char]0x2122) App"
          $distDir = Join-Path "dist" $appName
          if (!(Test-Path -LiteralPath $distDir)) {
            throw "Build output was not found: $distDir"
          }

          $requiredItems = @(
            "$appName.exe",
            "$appName.pkg",
            "_internal"
          )
          foreach ($item in $requiredItems) {
            $path = Join-Path $distDir $item
            if (!(Test-Path -LiteralPath $path)) {
              throw "Required Windows app bundle item is missing: $path"
            }
          }

          $exePath = Join-Path $distDir "$appName.exe"
          $pkgPath = Join-Path $distDir "$appName.pkg"
          $exeSize = (Get-Item -LiteralPath $exePath).Length
          $pkgSize = (Get-Item -LiteralPath $pkgPath).Length
          if ($pkgSize -le 0) {
            throw "PyInstaller external package is empty: $pkgPath"
          }
          Write-Host "Verified Windows app bundle."
          Write-Host "EXE size: $exeSize bytes"
          Write-Host "PKG size: $pkgSize bytes"

      - name: Create ZIP
        run: |
          $appName = "6ure$([char]0x2122) App"
          $distDir = Join-Path "dist" $appName
          if (!(Test-Path -LiteralPath $distDir)) {
            throw "Build output was not found: $distDir"
          }
          Get-ChildItem -LiteralPath $distDir -Recurse -Force | Where-Object {
            $_.Name -in @(
              "6ure-files-state.json",
              "6ure-files-state.backup.json",
              "6ure-files-state.tmp",
              "app-settings.json",
              "last-repair.json",
              "leaker-proxy-cookies.lwp",
              "6ure-secure-vault.json",
              "6ure-secure-vault.key",
              "hlx-api-key.txt"
            )
          } | Remove-Item -Force
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.WIN_PACKAGE }}"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $distDir "*") -DestinationPath $zipPath -Force
          Write-Host "Created portable ZIP with EXE, PKG, and _internal: $zipPath"

      - name: Create NSIS setup
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "Setup Output"
          $appName = "6ure$([char]0x2122) App"
          $sourceAppDir = Join-Path $env:GITHUB_WORKSPACE "Developer Files\Source Code\dist\$appName"
          if (!(Test-Path -LiteralPath (Join-Path $sourceAppDir "$appName.pkg"))) {
            throw "PyInstaller external package was not found before setup packaging: $sourceAppDir"
          }
          & ".\Developer Files\Installer\package-setup.ps1" -Version $env:APP_VERSION -SourceAppDir $sourceAppDir -OutputDir "Setup Output"
          if ($LASTEXITCODE -ne 0) {
            throw "Package setup failed with exit code $LASTEXITCODE"
          }
          $sourceSetup = Join-Path $outputDir "6ure-app-setup-$env:APP_VERSION.exe"
          $sourceNsi = Join-Path $outputDir "6ure-app-setup-$env:APP_VERSION.nsi"
          $setupPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.WIN_SETUP }}"
          $nsiPath = Join-Path $env:GITHUB_WORKSPACE "6ure-app-setup-windows-x64.nsi"
          Copy-Item -LiteralPath $sourceSetup -Destination $setupPath -Force
          Copy-Item -LiteralPath $sourceNsi -Destination $nsiPath -Force
          if (!(Test-Path -LiteralPath $setupPath)) {
            throw "NSIS setup output was not found: $setupPath"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            ${{ env.WIN_PACKAGE }}
            ${{ env.WIN_SETUP }}
          retention-days: 7

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Write app version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1))
          PY
          )"
          fi
          VERSION="${VERSION#v}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > app-version.json
          echo "App version: $VERSION"

      - name: Convert PNG to ICNS
        run: |
          rm -rf assets/6ure-logo.iconset
          mkdir -p assets/6ure-logo.iconset
          sips -z   16   16 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_16x16.png
          sips -z   32   32 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_16x16@2x.png
          sips -z   32   32 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_32x32.png
          sips -z   64   64 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_32x32@2x.png
          sips -z  128  128 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_128x128.png
          sips -z  256  256 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_128x128@2x.png
          sips -z  256  256 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_256x256.png
          sips -z  512  512 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_256x256@2x.png
          sips -z  512  512 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_512x512.png
          sips -z 1024 1024 assets/6ure-logo.png --out assets/6ure-logo.iconset/icon_512x512@2x.png
          iconutil -c icns assets/6ure-logo.iconset -o assets/6ure-logo.icns

      - name: Create macOS PyInstaller spec
        run: |
          cat > "6ure App.macos.spec" <<'PYISPEC'
          # -*- mode: python ; coding: utf-8 -*-

          import json
          from pathlib import Path

          app_name = "6ure™ App"
          app_version = json.loads(Path("app-version.json").read_text(encoding="utf-8")).get("version", "0.0.0")

          a = Analysis(
              ["files_app.py"],
              pathex=[],
              binaries=[],
              datas=[("index.html", "."), ("assets", "assets"), ("discord-presence.json", "."), ("update-config.json", "."), ("app-version.json", "."), ("ffx-effect-names.json", ".")],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name=app_name,
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon="assets/6ure-logo.icns",
          )

          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=False,
              upx_exclude=[],
              name=app_name,
          )

          app = BUNDLE(
              coll,
              name=f"{app_name}.app",
              icon="assets/6ure-logo.icns",
              bundle_identifier="com.reyli.6ureapp",
              info_plist={
                  "CFBundleShortVersionString": app_version,
                  "CFBundleVersion": app_version,
                  "NSHighResolutionCapable": True,
                  "NSRequiresAquaSystemAppearance": False,
              },
          )
          PYISPEC

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean "6ure App.macos.spec"

      - name: Verify macOS app bundle
        run: |
          APP_PATH="$(find dist -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist"
            exit 1
          fi
          test -f "$APP_PATH/Contents/Info.plist"
          test -d "$APP_PATH/Contents/MacOS"
          plutil -lint "$APP_PATH/Contents/Info.plist"

      - name: Codesign macOS app
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          APP_PATH="$(find dist -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist"
            exit 1
          fi
          if [ -n "$CODESIGN_IDENTITY" ]; then
            codesign --deep --force --options runtime --timestamp --sign "$CODESIGN_IDENTITY" "$APP_PATH"
          else
            echo "CODESIGN_IDENTITY is not set; using ad-hoc codesign for local compatibility."
            codesign --deep --force --sign - "$APP_PATH"
          fi
          codesign --verify --deep --strict "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="$(find dist -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in dist"
            exit 1
          fi
          DMG_PATH="$GITHUB_WORKSPACE/${{ env.MAC_PACKAGE }}"
          STAGE_DIR="$(mktemp -d "${RUNNER_TEMP:-/tmp}/6ure-dmg-stage.XXXXXX")"
          trap 'rm -rf "$STAGE_DIR"' EXIT
          ditto "$APP_PATH" "$STAGE_DIR/$(basename "$APP_PATH")"
          ln -s /Applications "$STAGE_DIR/Applications"
          rm -f "$DMG_PATH"

          for attempt in 1 2 3; do
            if hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "$STAGE_DIR" -ov -format UDZO "$DMG_PATH"; then
              hdiutil verify "$DMG_PATH"
              exit 0
            fi
            status=$?
            echo "hdiutil create failed on attempt $attempt with exit code $status"
            rm -f "$DMG_PATH"
            sleep $((attempt * 5))
          done
          exit "$status"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ${{ env.MAC_PACKAGE }}
          retention-days: 7

  build-linux:
    name: Linux tar.gz
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.SOURCE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            gir1.2-webkit2-4.1 \
            gobject-introspection \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pycairo PyGObject
          pip install -r requirements.txt

      - name: Write app version file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1))
          PY
          )"
          fi
          VERSION="${VERSION#v}"
          printf '{\n  "version": "%s"\n}\n' "$VERSION" > app-version.json
          echo "App version: $VERSION"

      - name: Create Linux PyInstaller spec
        run: |
          python - <<'PY'
          from pathlib import Path

          Path("6ure Files.linux.spec").write_text(
              """# -*- mode: python ; coding: utf-8 -*-

          app_name = "6ure™ App"

          a = Analysis(
              ["files_app.py"],
              pathex=[],
              binaries=[],
              datas=[
                  ("index.html", "."),
                  ("assets", "assets"),
                  ("discord-presence.json", "."),
                  ("update-config.json", "."),
                  ("app-version.json", "."),
                  ("ffx-effect-names.json", "."),
              ],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name=app_name,
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon=None,
          )

          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=False,
              upx_exclude=[],
              name=app_name,
          )
          """,
              encoding="utf-8",
          )
          PY

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean "6ure Files.linux.spec"

      - name: Prepare Linux portable bundle
        run: |
          python - <<'PY'
          import os
          import stat
          import textwrap
          from pathlib import Path

          app_dir = next((path for path in Path("dist").iterdir() if path.is_dir() and path.name.startswith("6ure")), None)
          if app_dir is None:
              raise SystemExit("Build output was not found in dist")

          executable = next(
              (
                  path
                  for path in app_dir.iterdir()
                  if path.is_file() and os.access(path, os.X_OK) and path.name.startswith("6ure")
              ),
              None,
          )
          if executable is None:
              raise SystemExit("Linux executable was not found in the app bundle")

          bash_source = "$" + "{" + "BASH_" + "SOURCE[0]" + "}"
          gdk_backend = "$" + "{" + "GDK_" + "BACKEND:-x11,wayland" + "}"
          webkit_compositing = "$" + "{" + "WEBKIT_DISABLE_" + "COMPOSITING_MODE:-1" + "}"
          no_at_bridge = "$" + "{" + "NO_AT_" + "BRIDGE:-1" + "}"
          launcher = app_dir / "launch-6ure-app.sh"
          launcher.write_text(
              f"""#!/usr/bin/env bash
          set -Eeuo pipefail
          APP_DIR="$(cd "$(dirname "{bash_source}")" && pwd)"
          export GDK_BACKEND="{gdk_backend}"
          export WEBKIT_DISABLE_COMPOSITING_MODE="{webkit_compositing}"
          export NO_AT_BRIDGE="{no_at_bridge}"
          exec "$APP_DIR/{executable.name}" "$@"
          """,
              encoding="utf-8",
          )
          launcher.chmod(launcher.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

          (app_dir / "README-linux.txt").write_text(
              textwrap.dedent(
                  """\
                  6ure App Linux package

                  Run ./launch-6ure-app.sh from this folder.

                  Required desktop libraries:
                  - Debian/Ubuntu: sudo apt install libgtk-3-0 libwebkit2gtk-4.1-0
                  - Fedora: sudo dnf install gtk3 webkit2gtk4.1
                  - Arch: sudo pacman -S gtk3 webkit2gtk-4.1

                  If your distro only ships WebKitGTK 4.0, install its equivalent package for your release.
                  """
              ),
              encoding="utf-8",
          )
          PY

      - name: Create tar.gz
        run: |
          APP_DIR="$(find dist -mindepth 1 -maxdepth 1 -type d -name '6ure*App' -print -quit)"
          if [ -z "$APP_DIR" ]; then
            echo "Build output was not found in dist"
            find dist -maxdepth 2 -print || true
            exit 1
          fi
          tar czf "$GITHUB_WORKSPACE/${{ env.LINUX_PACKAGE }}" -C "$(dirname "$APP_DIR")" "$(basename "$APP_DIR")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: ${{ env.LINUX_PACKAGE }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("Developer Files/Source Code/server.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_APP_VERSION\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("Could not read DEFAULT_APP_VERSION from server.py")
          print(match.group(1).lstrip("v"))
          PY
          )"
          fi

          echo "ver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum windows-build/${{ env.WIN_SETUP }} > checksums.txt
          sha256sum windows-build/${{ env.WIN_PACKAGE }} >> checksums.txt
          sha256sum macos-build/${{ env.MAC_PACKAGE }} >> checksums.txt
          sha256sum linux-build/${{ env.LINUX_PACKAGE }} >> checksums.txt
          echo "--- SHA-256 checksums ---"
          cat checksums.txt

      - name: Generate latest.json manifest
        run: |
          VERSION="${{ steps.version.outputs.ver }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          WIN_FILE="artifacts/windows-build/${{ env.WIN_SETUP }}"
          MAC_FILE="artifacts/macos-build/${{ env.MAC_PACKAGE }}"
          LNX_FILE="artifacts/linux-build/${{ env.LINUX_PACKAGE }}"

          WIN_SHA=$(sha256sum "$WIN_FILE" | awk '{print $1}')
          MAC_SHA=$(sha256sum "$MAC_FILE" | awk '{print $1}')
          LNX_SHA=$(sha256sum "$LNX_FILE" | awk '{print $1}')

          WIN_SIZE=$(stat -c%s "$WIN_FILE")
          MAC_SIZE=$(stat -c%s "$MAC_FILE")
          LNX_SIZE=$(stat -c%s "$LNX_FILE")

          cat > artifacts/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "Cloud Manager has its own sign out, Cloud actions reject no-op moves/renames, and FFX Tools now include folder scanning, progress, and optional original overwrite.",
            "windows": {
              "url": "${BASE_URL}/${{ env.WIN_SETUP }}",
              "sha256": "${WIN_SHA}",
              "sizeBytes": ${WIN_SIZE},
              "packageType": "installer",
              "installerArgs": "/S",
              "successExitCodes": [0, 3010]
            },
            "macos": {
              "url": "${BASE_URL}/${{ env.MAC_PACKAGE }}",
              "sha256": "${MAC_SHA}",
              "sizeBytes": ${MAC_SIZE},
              "packageType": "dmg"
            },
            "linux": {
              "url": "${BASE_URL}/${{ env.LINUX_PACKAGE }}",
              "sha256": "${LNX_SHA}",
              "sizeBytes": ${LNX_SIZE},
              "packageType": "tar.gz"
            }
          }
          MANIFEST

          echo "--- latest.json ---"
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "6ure™ App ${{ steps.version.outputs.ver }}"
          body: |
            ## 6ure™ App ${{ steps.version.outputs.ver }}

            ### Update Notes

            - Added a separate Cloud Manager sign out for the files.6ureleaks.com cloud account.
            - Hardened Cloud Manager rename, move, extract, and stale-session handling.
            - Integrated the standalone FFX Tools flow with folder scanning, progress feedback, lazy local file reads, and optional original-file overwrite.
            - Kept the release version at 1.5.2.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows Setup (x64) | `${{ env.WIN_SETUP }}` |
            | Windows Portable ZIP (x64) | `${{ env.WIN_PACKAGE }}` (EXE + PKG + _internal) |
            | macOS | `${{ env.MAC_PACKAGE }}` |
            | Linux (x64) | `${{ env.LINUX_PACKAGE }}` |

            See `checksums.txt` for SHA-256 verification.
            See `latest.json` for the auto-update manifest.
          files: |
            artifacts/windows-build/${{ env.WIN_SETUP }}
            artifacts/windows-build/${{ env.WIN_PACKAGE }}
            artifacts/macos-build/${{ env.MAC_PACKAGE }}
            artifacts/linux-build/${{ env.LINUX_PACKAGE }}
            artifacts/checksums.txt
            artifacts/latest.json
          draft: false
          prerelease: false
          make_latest: true

      - name: Update GitHub Pages latest.json
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" FETCH_HEAD

          cp artifacts/latest.json latest.json
          touch .nojekyll

          mkdir -p "Developer Files/GitHub Update Server"
          cp artifacts/latest.json "Developer Files/GitHub Update Server/latest.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json .nojekyll "Developer Files/GitHub Update Server/latest.json"

          if git diff --cached --quiet; then
            echo "GitHub Pages latest.json is already up to date."
            exit 0
          fi

          git commit -m "Update Pages auto-update manifest for ${{ steps.version.outputs.tag }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
